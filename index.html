ize:44px;font-weight:500;letter-spacing:-0.01em;line-height:1.1;\">Nasser Alghamdi<\u002Fh1><div dir=\"rtl\" style=\"font-family: 'Noto Naskh Arabic',serif; font-size: 23px; color: #B3A991; align-self: flex-start; width: 319px; height: 41px\">ناصر الغامدي<\u002Fdiv>\n        \n      <\u002Fdiv><div style=\"font-size:17px;color:#9C9485;line-height:1.5;\">Teaching assistant, University of Bisha · Saudi Arabia<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- about -->\n    <p data-screen-label=\"About\" style=\"margin:0;font-size:18.5px;line-height:1.75;color:#D8D2C6;text-wrap:pretty;\">I teach object-oriented programming, software engineering, and mobile app development at the University of Bisha. I hold an M.Sc. in Computer Science &amp; Software Engineering from the University of Washington Bothell (2020). Outside the classroom I build Android apps, manage a livestock farm, and take on programming work — mobile apps, websites, custom software, project supervision, and consulting.<\u002Fp>\n\n    <!-- services -->\n    <div data-screen-label=\"Services\" style=\"display:flex;flex-direction:column;gap:16px;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.16em;color:#8A8172;border-bottom:1px solid #26221C;padding-bottom:10px;\">SERVICES<\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:18px;font-size:17px;\">\n        <div style=\"display:flex;flex-direction:column;gap:3px;\">\n          <span style=\"color:#E9E4DA;\">Mobile App Development<\u002Fspan>\n          <span style=\"color:#8A8172;font-size:15px;line-height:1.55;\">Android apps, end to end — design, build, and Google Play delivery.<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:3px;\">\n          <span style=\"color:#E9E4DA;\">Website Development<\u002Fspan>\n          <span style=\"color:#8A8172;font-size:15px;line-height:1.55;\">Websites and web applications, from personal pages to full products.<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:3px;\">\n          <span style=\"color:#E9E4DA;\">Custom Software<\u002Fspan>\n          <span style=\"color:#8A8172;font-size:15px;line-height:1.55;\">Tailored software for business and&nbsp;operations.<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:3px;\">\n          <span style=\"color:#E9E4DA;\">Project Supervision<\u002Fspan>\n          <span style=\"color:#8A8172;font-size:15px;line-height:1.55;\">Supervision of software and graduation projects — scoping, review, and guidance to completion.<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:3px;\">\n          <span style=\"color:#E9E4DA;\">Programming<\u002Fspan>\n          <span style=\"color:#8A8172;font-size:15px;line-height:1.55;\">General-purpose programming — scripts, tools, and automation.<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:3px;\">\n          <span style=\"color:#E9E4DA;\">Technical Consulting<\u002Fspan>\n          <span style=\"color:#8A8172;font-size:15px;line-height:1.55;\">Architecture, code review, and engineering decisions.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- teaching -->\n    <div data-screen-label=\"Teaching\" style=\"display:flex;flex-direction:column;gap:16px;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.16em;color:#8A8172;border-bottom:1px solid #26221C;padding-bottom:10px;\">TEACHING<\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:13px;font-size:17px;\">\n        <div style=\"display:flex;justify-content:space-between;gap:24px;\"><span>Object-Oriented Programming<\u002Fspan><span style=\"color:#8A8172;font-size:15px;flex:none;\">University of Bisha<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;justify-content:space-between;gap:24px;\">< >A premium, tactile score-keeper for the card game Baloot — built as a precision instrument, not a casino app.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:6px;font-size:17px;margin-top:14px;\">\n        <div style=\"display:flex;justify-content:space-between;gap:24px;align-items:baseline;\">\n          <span style=\"color:#D3B879;\">Livestock Management System<\u002Fspan>\n          <span style=\"color:#8A8172;font-size:15px;flex:none;\">Software · in development<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"color:#9C9485;font-size:15.5px;line-height:1.6;text-wrap:pretty;\">Herd records and day-to-day operations for a working livestock farm.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- writing -->\n    <sc-if value=\"{{ showWriting }}\" hint-placeholder-val=\"{{ true }}\">\n      \n    <\u002Fsc-if>\n\n    <!-- request a service -->\n    <div id=\"request\" data-screen-label=\"Request a service\" style=\"display:flex;flex-direction:column;gap:16px;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.16em;color:#8A8172;border-bottom:1px solid #26221C;padding-bottom:10px;\">REQUEST A SERVICE<\u002Fdiv>\n      <div style=\"font-size:15.5px;color:#9C9485;line-height:1.6;\">Tell me what you need — the request opens in WhatsApp or your mail app, pre-filled.<\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:14px;\">\n        <div style=\"display:flex;gap:14px;flex-wrap:wrap;\">\n          <input type=\"text\" placeholder=\"Your name\" value=\"{{ reqName }}\" onchange=\"{{ setReqName }}\" style=\"flex:1;min-width:200px;background:#1A1712;border:1px solid #3A342B;border-radius:4px;color:#E9E4DA;font-family:'Newsreader',Georgia,serif;font-size:15.5px;padding:11px 13px;outline:none;\" style-focus=\"border-color:#8A8172;\">\n          <select value=\"{{ reqService }}\" onchange=\"{{ setReqService }}\" style=\"flex:1;min-width:200px;background:#1A1712;border:1px solid #3A342B;border-radius:4px;color:#E9E4DA;font-family:'Newsreader',Georgia,serif;font-size:15.5px;padding:11px 13px;outline:none;\">\n            <option>Mobile App Development<\u002Foption>\n            <option>Website Development<\u002Foption>\n            <option>Custom Software<\u002Foption>\n            <option>Project Supervision<\u002Foption>\n            <option>Programming<\u002Foption>\n            <option>Technical Consulting<\u002Foption>\n          <\u002Fselect>\n        <\u002Fdiv>\n        <textarea rows=\"4\" placeholder=\"Briefly describe your project or question…\" value=\"{{ reqDetails }}\" onchange=\"{{ setReqDetails }}\" style=\"background:#1A1712;border:1px solid #3A342B;border-radius:4px;color:#E9E4DA;font-family:'Newsreader',Georgia,serif;font-size:15.5px;line-height:1.6;padding:11px 13px;outline:none;resize:vertical;\" style-focus=\"border-color:#8A8172;\"><\u002Ftextarea>\n        <div style=\"display:flex;gap:14px;flex-wrap:wrap;\">\n          <button onclick=\"{{ sendWhatsApp }}\" style=\"cursor:pointer;background:transparent;border:1px solid #4A4230;border-radius:4px;color:#D3B879;font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:0.08em;padding:11px 18px;\" style-hover=\"border-color:#8A8172;color:#EBD79F;\">SEND VIA WHATSAPP<\u002Fbutton>\n          <button onclick=\"{{ sendEmail }}\" style=\"cursor:pointer;background:transparent;border:1px solid #3A342B;border-radius:4px;color:#B3A991;font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:0.08em;padding:11px 18px;\" style-hover=\"border-color:#8A8172;color:#E9E4DA;\">SEND BY EMAIL<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- contact -->\n    <div data-screen-label=\"Contact\" style=\"display:flex;flex-direction:column;gap:16px;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.16em;color:#8A8172;border-bottom:1px solid #26221C;padding-bottom:10px;\">CONTACT<\u  }),\n      setReqDetails: (e) => this.setState({ reqDetails: e.target.value }),\n      sendWhatsApp: () => {\n        window.open('https://wa.me/966531454655?text=' + encodeURIComponent(this.buildMessage()), '_blank', 'noopener');\n      },\n      sendEmail: () => {\n        const subject = 'Service request — ' + this.state.reqService;\n        window.location.href = 'mailto:nhgamdi@gmail.com?subject=' + encodeURIComponent(subject) + '&body=' + encodeURIComponent(this.buildMessage());\n      }\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
